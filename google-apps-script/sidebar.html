<script>
  // Highlight active sidebar navigation based on change hashes
  $(window).on('hashchange', function() {
    let hash = window.location.hash || '#landing';
    $(".sidebar .nav-link").removeClass("active");
    let targetId = "nav-" + hash.replace("#", "");
    if ($("#" + targetId).length) {
       $("#" + targetId).addClass("active");
    }
  });

  function logoutUser() {
    Swal.fire({
      title: 'ต้องการออกจากระบบหรือไม่?',
      text: "คุณจะต้องล็อกอินเข้าบัญชีวิชาแนะแนวใหม่อีกครั้งสำหรับการยืนยันสิทธิ์ข้อมูลความปลอดภัย",
      icon: 'question',
      showCancelButton: true,
      confirmButtonText: 'ออกจากระบบ',
      cancelButtonText: 'ยกเลิก'
    }).then((result) => {
       if (result.isConfirmed) {
         localStorage.removeItem("visit_user");
         currentUser = null;
         showToast("ออกจากระบบลงชื่อสำเร็จ", "info");
         window.location.hash = "#landing";
       }
    });
  }
</script>
