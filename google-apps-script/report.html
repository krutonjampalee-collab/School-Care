<!-- Reports UI (report.html) -->
<div class="authorized-area d-none mt-1">
  <div class="glass-card p-4">
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
      <div>
        <h4 class="fw-bold text-dark"><i class="fa-solid fa-file-invoice me-2 text-primary"></i>สารสนเทศและรายงานผลบอร์ด</h4>
        <p class="text-secondary small mb-0">พิมพ์รายงาน บร.01 จำลองภาพวิกฤติ และตรวจสอบการสมาคมจำแนกห้องเรียน</p>
      </div>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-md-6 text-sm">
        <label class="form-label text-secondary fw-semibold">เลือกชั้นเรียนเพื่อออกผล</label>
        <div class="input-group">
          <select class="form-select" id="rep-classroom">
            <option value="">-- กรองระดับชั้นเรียนทั้งหมด --</option>
            <option value="ม.1/1">มัธยมศึกษาปีที่ 1/1</option>
            <option value="ม.1/2">มัธยมศึกษาปีที่ 1/2</option>
            <option value="ม.2/1">มัธยมศึกษาปีที่ 2/1</option>
            <option value="ม.2/2">มัธยมศึกษาปีที่ 2/2</option>
            <option value="ม.3/1">มัธยมศึกษาปีที่ 3/1</option>
            <option value="ม.3/2">มัธยมศึกษาปีที่ 3/2</option>
          </select>
          <button class="btn btn-primary" onclick="queryReportCompilation()"><i class="fa-solid fa-gears me-2"></i> ประมวลผลรายงาน</button>
        </div>
      </div>
      
      <!-- Administrative Operations Backup -->
      <div class="col-md-6 text-end admin-only">
        <label class="form-label d-block text-secondary text-sm fw-semibold">สำรองข้อมูลระบบนิเวศครอบคลุม (Admin)</label>
        <button class="btn btn-warning fw-bold" onclick="backupDatabase()"><i class="fa-solid fa-cloud-arrow-down me-2"></i> สั่ง Backup ฐานข้อมูลลง Google Drive</button>
      </div>
    </div>

    <!-- Compile Table -->
    <div class="table-responsive">
      <table class="table table-bordered table-hover align-middle small" id="report-table">
        <thead class="bg-light">
          <tr>
            <th>ทะเบียนเดิม</th>
            <th>ชื่อ - นามสกุลจริงนักเรียน</th>
            <th>ชั้นห้องที่สังกัด</th>
            <th>เลขที่</th>
            <th>ผลยืนยันสถานะ</th>
            <th>วันที่เข้าตรวจเยี่ยม</th>
            <th>ประเมินสภาพครอบครัว</th>
            <th>GPS บ้านปัจจุบัน</th>
            <th class="text-center d-print-none">เครื่องมือ</th>
          </tr>
        </thead>
        <tbody id="report-table-body">
          <tr>
            <td colspan="9" class="text-center text-muted py-5">กรุณาเลือกเกณฑ์ชั้นเรียนแล้วกด 'ประมวลผลรายงาน' ด้านบน</td>
          </tr>
        </tbody>
      </table>
    </div>
    
    <div class="d-flex justify-content-end gap-2 mt-4 d-print-none">
       <button class="btn btn-outline-secondary" onclick="window.print()"><i class="fa-solid fa-print me-2"></i> สั่งพิมพ์ / บันทึก PDF</button>
    </div>
  </div>
</div>

<script>
  async function queryReportCompilation() {
    let cls = $("#rep-classroom").val();
    
    $("#loading-screen").fadeIn(200);
    try {
      let res = await runBackend("generateVisitReportSummary", cls);
      $("#loading-screen").fadeOut(200);
      
      if (res.success) {
        if (res.records.length === 0) {
           $("#report-table-body").html(`<tr><td colspan="9" class="text-center text-muted py-4">ไม่พบรายงานเยี่ยมประเมินผลในช่วงสอบถามนี้</td></tr>`);
           return;
        }

        let content = "";
        res.records.forEach(r => {
          let statusBadge = r.Visited === "เยี่ยมแล้ว" 
            ? `<span class="badge bg-success-subtle text-success">เยี่ยมแล้ว</span>` 
            : `<span class="badge bg-secondary-subtle text-secondary">ยังไม่เยี่ยม</span>`;
            
          let riskBadge = "-";
          if (r.RiskLevel === "ปกติ") riskBadge = `<span class="badge bg-success">ปกติ</span>`;
          else if (r.RiskLevel === "เสี่ยง") riskBadge = `<span class="badge bg-warning text-dark">เสี่ยง</span>`;
          else if (r.RiskLevel === "มีปัญหา" || r.RiskLevel === "เร่งด่วน") riskBadge = `<span class="badge bg-danger">${r.RiskLevel}</span>`;

          content += `
            <tr>
              <td class="fw-bold">${r.StudentCode}</td>
              <td>${r.FullName}</td>
              <td>${r.Classroom}</td>
              <td>${r.Number}</td>
              <td>${statusBadge}</td>
              <td>${r.VisitDate}</td>
              <td>${riskBadge}</td>
              <td><code>${r.GPS}</code></td>
              <td class="text-center d-print-none">
                <button class="btn btn-sm btn-outline-primary" onclick="printIndividualBr01('${r.StudentCode}')"><i class="fa-solid fa-print"></i> พิมพ์ บร.01</button>
              </td>
            </tr>
          `;
        });
        $("#report-table-body").html(content);
      }
    } catch (e) {
       $("#loading-screen").fadeOut(200);
       showToast("ไม่สามารถเรียกดูตารางสารสนเทศได้: " + e.message, "error");
    }
  }

  function backupDatabase() {
    Swal.fire({
      title: 'สร้างประวัติสำรองข้อมูลระบบย้อนกลับ',
      text: 'ระบบจะสร้างฟังก์ชัน snapshot ดึงคอลัมน์ฐานข้อมูลทั้งหมดบันทึกเป็นไฟล์ .json ออนบอร์ดไดรฟ์โรงเรียน คุณต้องการดำเนินต่อไหม?',
      icon: 'info',
      showCancelButton: true,
      confirmButtonText: 'ใช่, ดำเนินการ Backup!',
      cancelButtonText: 'ยกเลิก'
    }).then(async (result) => {
       if (result.isConfirmed) {
          $("#loading-screen").fadeIn(200);
          try {
             let res = await runBackend("backupDatabaseJson");
             $("#loading-screen").fadeOut(200);
             if (res.success) {
               Swal.fire({
                 title: 'สำรองไฟล์ลุล่วง',
                 html: `สร้างคัดลอก snapshot และเซฟไว้ที่ Drive ปลอดภัยเรียบร้อย<br><br><a href="${res.url}" target="_blank" class="btn btn-success fw-bold">คลิกที่นี่เพื่อเปิดแง้มประวัติไฟล์บน Drive</a>`,
                 icon: 'success'
               });
             } else {
               Swal.fire("ขัดข้องเทคนิคภายนอก", res.error, "error");
             }
          } catch (evt) {
             $("#loading-screen").fadeOut(200);
             Swal.fire("ข้อผิดพลาด", evt.message, "error");
          }
       }
    });
  }

  function printIndividualBr01(studentCode) {
     Swal.fire("กำลังประมวลผล", `ระบุกำลังเขียนฟอร์มสะท้อน บร.01 สังกัดนักเรียน ${studentCode} เสนอกระทู้เขียนตารางเสร็จสิ้น`, "info");
     setTimeout(() => {
        window.print();
     }, 1000);
  }
</script>
