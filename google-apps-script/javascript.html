<!-- Client-side JavaScript Scripts (javascript.html) -->
<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.datatables.net/1.13.5/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.5/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
  // Session global states
  let currentUser = JSON.parse(localStorage.getItem("visit_user")) || null;
  let activeTheme = localStorage.getItem("theme") || "light";
  
  // Custom promisified wrapper for google.script.run
  function runBackend(methodName, ...args) {
    return new Promise((resolve, reject) => {
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(res => resolve(res))
          .withFailureHandler(err => reject(err))[methodName](...args);
      } else {
        // Local Browser Demo Mock fallback if loading outside GAS
        console.warn(`Running mock for backend method: ${methodName}`);
        setTimeout(() => {
          resolve({ success: true, message: `Mock response for ${methodName}`, records: [] });
        }, 800);
      }
    });
  }

  $(document).ready(function() {
    setupTheme();
    setupRouter();
    checkUserSession();
    
    // Hide loading screen
    setTimeout(() => {
      $("#loading-screen").fadeOut(300);
    }, 500);
  });

  function setupTheme() {
    document.documentElement.setAttribute("data-theme", activeTheme);
    if(activeTheme === "dark") {
      $("#theme-icon").removeClass("fa-moon").addClass("fa-sun");
    }
  }

  function toggleTheme() {
    activeTheme = activeTheme === "light" ? "dark" : "light";
    localStorage.setItem("theme", activeTheme);
    document.documentElement.setAttribute("data-theme", activeTheme);
    if(activeTheme === "dark") {
       $("#theme-icon").removeClass("fa-moon").addClass("fa-sun");
       showToast("เปลี่ยนเป็นธีมกลางคืนแล้ว", "info");
    } else {
       $("#theme-icon").removeClass("fa-sun").addClass("fa-moon");
       showToast("เปลี่ยนเป็นธีมกลางวันแล้ว", "info");
    }
  }

  /**
   * Simple SPA Routing System
   */
  function setupRouter() {
    $(window).on('hashchange', function() {
      let hash = window.location.hash || '#landing';
      navigateTo(hash);
    });
    // Trigger initial on load
    let initialHash = window.location.hash || '#landing';
    navigateTo(initialHash);
  }

  function navigateTo(hash) {
    $(".subpage").addClass("d-none");
    let targetPage = hash.replace("#", "page-");
    
    // Force Authentication route locks
    if (["page-dashboard", "page-student", "page-teacher", "page-homevisit", "page-report", "page-settings", "page-profile"].includes(targetPage) && !currentUser) {
      window.location.hash = "#login";
      return;
    }

    if ($("#" + targetPage).length) {
      $("#" + targetPage).removeClass("d-none");
    } else {
      $("#page-landing").removeClass("d-none");
    }

    // Refresh pages metrics on load
    if (currentUser) {
      $("#logged-username").text(currentUser.fullName);
      $("#sidebar-profile-name").text(currentUser.fullName);
      $("#sidebar-profile-role").text(currentUser.role === 'Admin' ? 'ผู้ดูแลระบบ' : 'อาจารย์ผู้เข้าเยี่ยม');
      $(".authorized-area").removeClass("d-none");
      $(".guest-area").addClass("d-none");
      
      // Control nav components
      if (currentUser.role !== "Admin") {
        $(".admin-only").addClass("d-none");
      } else {
        $(".admin-only").removeClass("d-none");
      }
    } else {
      $(".authorized-area").addClass("d-none");
      $(".guest-area").removeClass("d-none");
    }

    // Load active tab viewports
    if (targetPage === "page-dashboard") {
      loadDashboardMetrics();
    } else if (targetPage === "page-student") {
      loadStudentsTable(1, "");
    } else if (targetPage === "page-teacher") {
      loadTeachersTable();
    } else if (targetPage === "page-settings") {
      loadGeneralSettings();
    }
  }

  function checkUserSession() {
    if (currentUser) {
      $(".authorized-area").removeClass("d-none");
      $(".guest-area").addClass("d-none");
    } else {
      $(".authorized-area").addClass("d-none");
      $(".guest-area").removeClass("d-none");
    }
  }

  // Toast alert feedback helper
  function showToast(title, icon = "success") {
    Swal.fire({
      toast: true,
      position: 'top-end',
      showConfirmButton: false,
      timer: 3000,
      timerProgressBar: true,
      icon: icon,
      title: title
    });
  }

  /**
   * Binary Image base64 Conversions
   */
  function bindPhotoUploader(elemId, hiddenInputId) {
    $(`#${elemId}`).on('click', function() {
      let fileInput = $('<input type="file" accept="image/*">');
      fileInput.on('change', function(e) {
        let file = e.target.files[0];
        if (file) {
          let reader = new FileReader();
          reader.onload = function(evt) {
            $(`#${elemId}`).css('background-image', `url(${evt.target.result})`)
              .find('span, i').addClass('d-none');
            $(`#${hiddenInputId}`).val(evt.target.result);
          };
          reader.readAsDataURL(file);
        }
      });
      fileInput.click();
    });
  }

  function clearPhotoSlot(elemId, hiddenInputId) {
    $(`#${elemId}`).css('background-image', '')
      .find('span, i').removeClass('d-none');
    $(`#${hiddenInputId}`).val("");
  }

  /**
   * Interactive Signature Pen Canvas Setup
   */
  function setupSignaturePad(canvasId) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    let drawing = false;

    // Correct scaling
    canvas.width = canvas.parentElement.clientWidth;
    canvas.height = 150;

    ctx.strokeStyle = "#000000";
    ctx.lineWidth = 2;

    function getMousePos(canvasDom, touchOrMouseEvent) {
      let rect = canvasDom.getBoundingClientRect();
      let clientX = touchOrMouseEvent.clientX || touchOrMouseEvent.touches[0].clientX;
      let clientY = touchOrMouseEvent.clientY || touchOrMouseEvent.touches[0].clientY;
      return {
        x: clientX - rect.left,
        y: clientY - rect.top
      };
    }

    $(canvas).on("mousedown touchstart", function(e) {
      e.preventDefault();
      drawing = true;
      let pos = getMousePos(canvas, e);
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
    });

    $(canvas).on("mousemove touchmove", function(e) {
      if (!drawing) return;
      e.preventDefault();
      let pos = getMousePos(canvas, e);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    });

    $(canvas).on("mouseup touchend", function(e) {
      drawing = false;
    });
  }

  function clearSignature(canvasId) {
    const canvas = document.getElementById(canvasId);
    if (canvas) {
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }

  function getSignatureBase64(canvasId) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return "";
    
    // Check if empty by calculating blank canvas
    const blank = document.createElement('canvas');
    blank.width = canvas.width;
    blank.height = canvas.height;
    if (canvas.toDataURL() === blank.toDataURL()) {
      return "";
    }
    return canvas.toDataURL();
  }
</script>
